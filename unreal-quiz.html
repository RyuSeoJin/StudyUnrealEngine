<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UE Codex — 언리얼 C++ 개념 복습 & 퀴즈</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0d1117;
    --bg-soft: #161b22;
    --bg-card: #1a2029;
    --border: #2d3441;
    --border-bright: #3d4756;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --text-faint: #6e7681;
    --accent: #58d6a0;       /* unreal-ish green */
    --accent-2: #4fb3ff;     /* blue */
    --accent-3: #d99cff;     /* purple - matches macro examples */
    --amber: #f0b860;
    --coral: #ff7b72;
    --good: #3fb950;
    --bad: #f85149;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 10%, rgba(88,214,160,0.06), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(79,179,255,0.06), transparent 40%);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.6;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* subtle grid texture */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
  }

  .wrap { max-width: 920px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

  /* ===== Header ===== */
  header {
    padding: 56px 0 32px;
    text-align: center;
  }
  .logo {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: inline-block;
    border: 1px solid var(--border-bright);
    padding: 5px 14px;
    border-radius: 4px;
    background: var(--bg-soft);
  }
  h1 {
    font-size: clamp(34px, 6vw, 56px);
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -1.5px;
    margin-bottom: 14px;
  }
  h1 .grad {
    background: linear-gradient(110deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle { color: var(--text-dim); font-size: 16px; max-width: 540px; margin: 0 auto; }

  /* ===== Tabs ===== */
  .tabs {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin: 36px 0 8px;
    flex-wrap: wrap;
  }
  .tab {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    color: var(--text-dim);
    background: var(--bg-soft);
    border: 1px solid var(--border);
    padding: 10px 22px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .tab:hover { color: var(--text); border-color: var(--border-bright); }
  .tab.active {
    color: var(--bg);
    background: var(--accent);
    border-color: var(--accent);
    font-weight: 700;
  }

  .view { display: none; animation: fade 0.4s ease; }
  .view.active { display: block; }
  @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  section.panel { margin-top: 28px; }
  .section-label {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after { content: ""; flex: 1; height: 1px; background: var(--border); }

  /* ===== Concept cards ===== */
  .cards { display: grid; gap: 16px; }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s ease, transform 0.2s ease;
  }
  .card:hover { border-color: var(--border-bright); }
  .card-head {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 22px;
    cursor: pointer;
    user-select: none;
  }
  .card-tag {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 5px;
    flex-shrink: 0;
  }
  .tag-1 { background: rgba(88,214,160,0.15); color: var(--accent); }
  .tag-2 { background: rgba(79,179,255,0.15); color: var(--accent-2); }
  .tag-3 { background: rgba(217,156,255,0.15); color: var(--accent-3); }
  .tag-4 { background: rgba(240,184,96,0.15); color: var(--amber); }
  .tag-5 { background: rgba(255,123,114,0.15); color: var(--coral); }
  .card-title { font-size: 18px; font-weight: 600; flex: 1; }
  .card-chevron { color: var(--text-faint); transition: transform 0.25s ease; font-size: 14px; }
  .card.open .card-chevron { transform: rotate(90deg); }
  .card-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;
  }
  .card.open .card-body { max-height: 800px; }
  .card-body-inner { padding: 0 22px 22px; color: var(--text-dim); font-size: 15px; }
  .card-body-inner p { margin-bottom: 12px; }
  .card-body-inner strong { color: var(--text); font-weight: 600; }
  .card-body-inner code {
    font-family: var(--mono);
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 13px;
    color: var(--accent);
  }
  pre {
    font-family: var(--mono);
    background: var(--bg);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent-2);
    border-radius: 8px;
    padding: 14px 16px;
    overflow-x: auto;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    margin: 10px 0;
  }
  pre .cm { color: var(--text-faint); }
  pre .kw { color: var(--accent-3); }
  pre .mac { color: var(--amber); }

  /* ===== Quiz ===== */
  .quiz-intro {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    text-align: center;
    margin-top: 28px;
  }
  .quiz-intro h2 { font-size: 22px; margin-bottom: 10px; }
  .quiz-intro p { color: var(--text-dim); margin-bottom: 20px; }

  .btn {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 15px;
    padding: 13px 32px;
    border-radius: 9px;
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
    background: var(--accent);
    color: var(--bg);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(88,214,160,0.3); }
  .btn.ghost { background: var(--bg-soft); color: var(--text); border: 1px solid var(--border-bright); }
  .btn.ghost:hover { box-shadow: none; border-color: var(--accent); }

  .progress-bar {
    height: 6px;
    background: var(--bg-soft);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 8px;
    border: 1px solid var(--border);
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    width: 0%;
    transition: width 0.4s ease;
  }
  .progress-text {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-faint);
    text-align: right;
    margin-bottom: 20px;
  }

  .question-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
  }
  .q-type {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }
  .q-text { font-size: 19px; font-weight: 600; margin-bottom: 8px; line-height: 1.45; }
  .q-code {
    font-family: var(--mono);
    background: var(--bg);
    border: 1px solid var(--border);
    border-left: 3px solid var(--amber);
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 14px;
    color: var(--text);
    margin: 16px 0;
    overflow-x: auto;
    line-height: 1.7;
  }
  .q-code .mac { color: var(--amber); }
  .q-code .kw { color: var(--accent-3); }
  .q-code .cm { color: var(--text-faint); }

  .options { display: grid; gap: 10px; margin-top: 20px; }
  .opt {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 15px 18px;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.18s ease;
    font-size: 15px;
  }
  .opt:hover:not(.locked) { border-color: var(--accent); transform: translateX(3px); }
  .opt-key {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 13px;
    width: 26px;
    height: 26px;
    display: grid;
    place-items: center;
    border-radius: 6px;
    background: var(--bg);
    border: 1px solid var(--border-bright);
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .opt.correct { border-color: var(--good); background: rgba(63,185,80,0.12); }
  .opt.correct .opt-key { background: var(--good); color: var(--bg); border-color: var(--good); }
  .opt.wrong { border-color: var(--bad); background: rgba(248,81,73,0.12); }
  .opt.wrong .opt-key { background: var(--bad); color: var(--bg); border-color: var(--bad); }
  .opt.locked { cursor: default; }
  .opt.dim { opacity: 0.5; }

  .explain {
    margin-top: 18px;
    padding: 16px 18px;
    border-radius: 10px;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent-2);
    font-size: 14px;
    color: var(--text-dim);
    display: none;
  }
  .explain.show { display: block; animation: fade 0.3s ease; }
  .explain strong { color: var(--text); }

  .q-nav { display: flex; justify-content: space-between; margin-top: 24px; gap: 12px; }

  /* ===== Result ===== */
  .result {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 44px 28px;
    text-align: center;
  }
  .score-ring {
    width: 150px; height: 150px;
    margin: 0 auto 22px;
    position: relative;
  }
  .score-num {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    font-family: var(--mono);
    font-size: 38px;
    font-weight: 800;
  }
  .result h2 { font-size: 26px; margin-bottom: 8px; }
  .result p { color: var(--text-dim); margin-bottom: 26px; }
  .result .btn { margin: 0 6px; }

  footer {
    text-align: center;
    margin-top: 60px;
    color: var(--text-faint);
    font-family: var(--mono);
    font-size: 12px;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <span class="logo">// Unreal Engine C++</span>
    <h1>UE <span class="grad">Codex</span></h1>
    <p class="subtitle">언리얼 C++ 입문 개념을 카드로 복습하고, 가볍게 퀴즈로 점검하세요.</p>
  </header>

  <div class="tabs">
    <button class="tab active" data-view="learn">📘 개념 복습</button>
    <button class="tab" data-view="quiz">✏️ 문제 풀이</button>
  </div>

  <!-- ============ LEARN VIEW ============ -->
  <div class="view active" id="view-learn">
    <section class="panel">
      <div class="section-label">Concept Cards · 클릭해서 펼치기</div>
      <div class="cards" id="cards"></div>
    </section>
  </div>

  <!-- ============ QUIZ VIEW ============ -->
  <div class="view" id="view-quiz">
    <!-- intro -->
    <div id="quiz-intro" class="quiz-intro">
      <h2>개념 점검 퀴즈</h2>
      <p>객관식과 코드 보고 맞히기 문제가 섞여 있어요. 한 문제씩 풀고 바로 해설을 확인하세요.</p>
      <button class="btn" id="start-btn">퀴즈 시작 →</button>
    </div>

    <!-- running -->
    <div id="quiz-running" style="display:none;">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-text" id="progress-text"></div>
      <div class="question-card" id="question-card"></div>
      <div class="q-nav">
        <button class="btn ghost" id="prev-btn">← 이전</button>
        <button class="btn" id="next-btn" disabled>다음 →</button>
      </div>
    </div>

    <!-- result -->
    <div id="quiz-result" style="display:none;"></div>
  </div>

  <footer>built for self-study · 단일 HTML 파일로 작동합니다</footer>
</div>

<script>
/* =========================================================
   DATA — 우리가 대화에서 다룬 5개 주제
   ========================================================= */
const concepts = [
  {
    tag: "01", tagClass: "tag-1", title: "블루프린트 vs C++ — 무엇을 먼저?",
    body: `
      <p>입문자는 <strong>블루프린트를 먼저, C++을 그 다음</strong>으로 배우는 게 좋습니다. C++부터 파면 'C++ 문법'과 '언리얼 프레임워크'를 동시에 만나 막힌 곳이 어디 문제인지조차 헷갈리기 때문이에요.</p>
      <p>블루프린트는 노드를 연결하는 비주얼 스크립팅이라, 문법 부담 없이 엔진의 핵심 개념(액터 스폰, 충돌 감지, 이벤트 반응)을 먼저 익히게 해줍니다. 중요한 건 <strong>블루프린트 노드 하나하나가 거의 그대로 C++ 함수에 대응</strong>한다는 점이에요.</p>
      <p>실무에서 가장 많이 쓰는 방식은 <strong>하이브리드</strong>입니다 — 무거운 로직·성능 중요한 부분은 C++로, 디자이너가 자주 건드리는 수치·연출은 블루프린트로.</p>
    `
  },
  {
    tag: "02", tagClass: "tag-2", title: "#include — 다른 파일 가져오기",
    body: `
      <p><code>#include</code>는 <strong>"다른 파일의 내용을 여기로 가져와라"</strong>는 명령입니다. 내가 쓰려는 기능이 다른 파일에 있을 때, 그 파일을 먼저 포함시켜야 컴파일러가 알아봅니다.</p>
      <p>비유하면 요리에서 "토마토 소스 레시피 카드를 작업대 위로 가져오는" 것과 같아요. 가져오지 않으면 컴파일러는 "그런 거 모르는데?" 하고 에러를 냅니다.</p>
      <pre><span class="cm">// 시스템/엔진 기본 제공 파일</span>
#include &lt;iostream&gt;
<span class="cm">// 내 프로젝트 안에 있는 파일</span>
#include "Items/Weapon.h"</pre>
      <p>꺾쇠 <code>&lt; &gt;</code>는 표준 라이브러리·엔진 기본 파일, 큰따옴표 <code>" "</code>는 내 프로젝트 파일을 찾을 때 씁니다. 경로는 모듈 루트 기준 상대 경로예요.</p>
    `
  },
  {
    tag: "03", tagClass: "tag-3", title: ".h 와 .cpp — 왜 쌍으로 다닐까",
    body: `
      <p><code>.h</code>(헤더)는 <strong>선언 — "무엇이 있는지"</strong>만 적는 메뉴판입니다. <code>.cpp</code>(소스)는 <strong>구현 — "어떻게 동작하는지"</strong>를 적는 레시피예요.</p>
      <pre><span class="cm">// Weapon.h — 메뉴판 (선언)</span>
<span class="kw">class</span> Weapon {
  <span class="kw">void</span> Fire();   <span class="cm">// 있다고만 적음</span>
};</pre>
      <pre><span class="cm">// Weapon.cpp — 레시피 (구현)</span>
#include "Weapon.h"
<span class="kw">void</span> Weapon::Fire() { <span class="cm">/* 실제 동작 */</span> }</pre>
      <p>분리하는 이유는 ① 다른 코드는 메뉴판만 알면 됨 ② 구현만 고치면 그 파일만 다시 컴파일 → 빌드 빠름 ③ 설계도와 구현이 깔끔히 나뉨. 메뉴판의 메뉴는 주방에 실제 레시피가 있어야 손님에게 낼 수 있으므로 <strong>둘은 한 쌍</strong>으로 다닙니다.</p>
    `
  },
  {
    tag: "04", tagClass: "tag-4", title: "UCLASS / UPROPERTY / UFUNCTION 매크로",
    body: `
      <p>이 매크로들은 C++ 코드를 <strong>블루프린트·에디터에서 보이게 해주는 다리</strong>입니다. 안 붙이면 그 변수·함수는 C++ 내부에만 머물러요.</p>
      <pre><span class="mac">UCLASS()</span>                          <span class="cm">// 클래스를 언리얼이 관리</span>
<span class="kw">class</span> AWeapon : <span class="kw">public</span> AActor {
  <span class="mac">UPROPERTY(EditAnywhere)</span>       <span class="cm">// 변수를 에디터에 노출</span>
  int32 Ammo;
  <span class="mac">UFUNCTION(BlueprintCallable)</span>  <span class="cm">// 함수를 BP 노드로</span>
  <span class="kw">void</span> Fire();
};</pre>
      <p>괄호 안 값(specifier)이 핵심입니다. 자주 쓰는 조합: <code>UPROPERTY(EditAnywhere, BlueprintReadWrite, Category="Combat")</code>, <code>UFUNCTION(BlueprintCallable)</code>. 연출을 디자이너에게 맡길 땐 <code>BlueprintImplementableEvent</code>를 씁니다.</p>
    `
  },
  {
    tag: "05", tagClass: "tag-5", title: "접두사 A · U · F · I",
    body: `
      <p>언리얼은 클래스 이름 앞에 <strong>종류를 알려주는 글자</strong>를 붙입니다. 이름만 봐도 무엇인지 보이게 하려는 약속이에요.</p>
      <p><code>A</code> = <strong>Actor</strong> — 월드에 직접 배치 가능한 물체 (AActor, APawn, ACharacter).<br>
      <code>U</code> = <strong>UObject</strong> 자손 중 Actor가 아닌 것 — 다른 것에 붙여 쓰는 부품·UI·에셋 (UActorComponent).<br>
      <code>F</code> = 가벼운 데이터 묶음 (FVector, FString) — 언리얼이 관리하지 않는 구조체.<br>
      <code>I</code> = <strong>Interface</strong> — "이런 기능 있어요"라는 약속.</p>
      <p>핵심 기준: <strong>월드에 혼자 놓을 수 있으면 <code>A</code>, 무언가에 붙어야 하면 <code>U</code></strong>. 자동차(A) 안에 엔진·바퀴(U)가 박히는 관계예요. <code>U</code>는 Unreal이 아니라 최상위 부모 클래스 <code>UObject</code>에서 따온 글자입니다.</p>
    `
  }
];

/* ---- Quiz questions ---- */
const questions = [
  {
    type: "객관식",
    q: "입문자가 언리얼을 배울 때 권장되는 순서는?",

/* =========================================================
   QUIZ logic
   ========================================================= */
let current = 0;
const answers = new Array(questions.length).fill(null);

const introEl = document.getElementById('quiz-intro');
const runningEl = document.getElementById('quiz-running');
const resultEl = document.getElementById('quiz-result');
const qCard = document.getElementById('question-card');
const fill = document.getElementById('progress-fill');
const ptext = document.getElementById('progress-text');
const nextBtn = document.getElementById('next-btn');
const prevBtn = document.getElementById('prev-btn');

document.getElementById('start-btn').addEventListener('click', () => {
  introEl.style.display = 'none';
  runningEl.style.display = 'block';
  current = 0;
  renderQuestion();
});

function renderQuestion() {
  const q = questions[current];
  const chosen = answers[current];
  const locked = chosen !== null;

  fill.style.width = ((current) / questions.length * 100) + '%';
  ptext.textContent = `문제 ${current + 1} / ${questions.length}`;

  let html = `<div class="q-type">${q.type}</div>`;
  html += `<div class="q-text">${q.q}</div>`;
  if (q.code) html += `<div class="q-code">${q.code.replace(/\n/g,'<br>')}</div>`;
  html += `<div class="options">`;
  const keys = ['A','B','C','D'];
  q.options.forEach((opt, idx) => {
    let cls = 'opt';
    if (locked) {
      cls += ' locked';
      if (idx === q.answer) cls += ' correct';
      else if (idx === chosen) cls += ' wrong';
      else cls += ' dim';
    }
    html += `<div class="${cls}" data-idx="${idx}">
      <span class="opt-key">${keys[idx]}</span><span>${opt}</span></div>`;
  });
  html += `</div>`;
  html += `<div class="explain ${locked ? 'show':''}"><strong>해설.</strong> ${q.explain}</div>`;
  qCard.innerHTML = html;

  if (!locked) {
    qCard.querySelectorAll('.opt').forEach(o => {
      o.addEventListener('click', () => {
        answers[current] = parseInt(o.dataset.idx);
        renderQuestion();
      });
    });
  }

  prevBtn.style.visibility = current === 0 ? 'hidden' : 'visible';
  nextBtn.disabled = !locked;
  nextBtn.textContent = current === questions.length - 1 ? '결과 보기 →' : '다음 →';
}

nextBtn.addEventListener('click', () => {
  if (current < questions.length - 1) {
    current++;
    renderQuestion();
  } else {
    showResult();
  }
});
prevBtn.addEventListener('click', () => {
  if (current > 0) { current--; renderQuestion(); }
});

function showResult() {
  runningEl.style.display = 'none';
  resultEl.style.display = 'block';
  const score = answers.reduce((s, a, i) => s + (a === questions[i].answer ? 1 : 0), 0);
  const pct = Math.round(score / questions.length * 100);
  const color = pct >= 80 ? 'var(--good)' : pct >= 50 ? 'var(--amber)' : 'var(--coral)';
  let msg = pct >= 80 ? '훌륭해요! 핵심 개념을 확실히 잡으셨네요.' :
            pct >= 50 ? '좋아요. 틀린 부분만 카드로 한 번 더 복습해볼까요?' :
            '괜찮아요. 개념 복습 탭에서 카드를 펼쳐보고 다시 도전해보세요.';
  const circ = 2 * Math.PI * 65;
  resultEl.innerHTML = `
    <div class="result">
      <div class="score-ring">
        <svg width="150" height="150" viewBox="0 0 150 150">
          <circle cx="75" cy="75" r="65" fill="none" stroke="var(--border)" stroke-width="10"/>
          <circle cx="75" cy="75" r="65" fill="none" stroke="${color}" stroke-width="10"
            stroke-linecap="round" stroke-dasharray="${circ}"
            stroke-dashoffset="${circ - circ * pct/100}"
            transform="rotate(-90 75 75)" style="transition:stroke-dashoffset 0.8s ease"/>
        </svg>
        <div class="score-num" style="color:${color}">${pct}%</div>
      </div>
      <h2>${score} / ${questions.length} 정답</h2>
      <p>${msg}</p>
      <button class="btn" id="retry-btn">다시 풀기</button>
      <button class="btn ghost" id="review-btn">개념 복습하기</button>
    </div>
  `;
  document.getElementById('retry-btn').addEventListener('click', () => {
    answers.fill(null);
    current = 0;
    resultEl.style.display = 'none';
    introEl.style.display = 'block';
  });
  document.getElementById('review-btn').addEventListener('click', () => {
    document.querySelector('.tab[data-view="learn"]').click();
  });
}
